name: 📲 Telegram File Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: '🔗 Telegram links (separate with commas, spaces, or new lines)'
        required: true
        type: string
      password:
        description: '🔐 Password for archive (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ Configure Git for large files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "✅ Git configured for large file handling"

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq openssl bc zip unzip python3 aria2 p7zip-full

          echo "✅ Dependencies installed"
          echo ""
          echo "Tool versions:"
          curl --version | head -1
          wget --version | head -1
          aria2c --version | head -1
          jq --version
          zip --version | head -2
          7z --help | head -2

      - name: 📁 Ensure downloads folder exists
        run: |
          mkdir -p downloads
          echo "✅ Downloads folder ready"

      - name: 📋 Parse & Resolve Multiple Links
        id: resolve
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, sys, re, urllib.parse

          raw_input = """${{ github.event.inputs.telegram_links }}"""

          # Parse links (handle commas, spaces, newlines)
          links = re.split(r'[,\s\n]+', raw_input)
          links = [l.strip() for l in links if l.strip() and l.strip().startswith('http')]

          # Remove duplicates while preserving order
          seen = set()
          unique_links = []
          for link in links:
              if link not in seen:
                  seen.add(link)
                  unique_links.append(link)

          print(f"{'='*60}")
          print(f"📋 Found {len(unique_links)} unique link(s):")
          print(f"{'='*60}")
          for i, link in enumerate(unique_links, 1):
              print(f"  {i}. {link[:80]}...")

          if not unique_links:
              print("❌ No valid links found!")
              sys.exit(1)

          downloads = []
          failed = []

          for idx, telegram_link in enumerate(unique_links, 1):
              print(f"\n{'='*60}")
              print(f"🔍 [{idx}/{len(unique_links)}] Resolving: {telegram_link[:70]}...")
              print(f"{'='*60}")

              raw_url = None
              file_name = None

              # Method 1: telegramdownloader.net API
              try:
                  print("🌐 Method 1: telegramdownloader.net...")
                  encoded_link = urllib.parse.quote(telegram_link)
                  result = subprocess.run([
                      'curl', '-s', '--max-time', '30', '-X', 'POST',
                      '-H', 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                      '-H', 'Content-Type: application/x-www-form-urlencoded',
                      '-d', f'telegram_link={encoded_link}',
                      'https://telegramdownloader.net/proxy.php'
                  ], capture_output=True, text=True, timeout=35)

                  if result.returncode == 0 and result.stdout:
                      data = json.loads(result.stdout)
                      raw_url = data.get('data', {}).get('data', {}).get('link')
                      file_name = data.get('data', {}).get('data', {}).get('file_name')
                      if raw_url:
                          print(f"✅ Method 1 succeeded!")
              except Exception as e:
                  print(f"⚠️ Method 1 failed: {e}")

              # Method 2: tgsave.com API
              if not raw_url:
                  try:
                      print("🌐 Method 2: tgsave.com...")
                      result = subprocess.run([
                          'curl', '-s', '--max-time', '30', '-X', 'POST',
                          '-H', 'User-Agent: Mozilla/5.0',
                          '-H', 'Content-Type: application/json',
                          '-d', json.dumps({"url": telegram_link}),
                          'https://api.tgsave.com/download'
                      ], capture_output=True, text=True, timeout=35)

                      if result.returncode == 0 and result.stdout:
                          data = json.loads(result.stdout)
                          raw_url = data.get('url') or data.get('link') or data.get('download_url')
                          file_name = data.get('filename') or data.get('file_name') or data.get('name')
                          if raw_url:
                              print(f"✅ Method 2 succeeded!")
                  except Exception as e:
                      print(f"⚠️ Method 2 failed: {e}")

              # Method 3: Direct CDN scrape
              if not raw_url:
                  try:
                      print("🌐 Method 3: Direct CDN detection...")
                      result = subprocess.run([
                          'curl', '-sL', '--max-time', '20',
                          '-H', 'User-Agent: TelegramBot (like TwitterBot)',
                          telegram_link
                      ], capture_output=True, text=True, timeout=25)

                      if result.returncode == 0:
                          # Look for CDN links
                          cdn_match = re.search(r'https://cdn[0-9]*\.telesco\.pe/file/[^"]+', result.stdout)
                          if cdn_match:
                              raw_url = cdn_match.group(0)
                          else:
                              media_match = re.search(r'content="([^"]+\.(mp4|mov|avi|mkv|pdf|zip|rar|7z|jpg|jpeg|png|gif|mp3|m4a|wav|flac)[^"]*)"', result.stdout)
                              if media_match:
                                  raw_url = media_match.group(1)

                          if raw_url:
                              file_name = raw_url.split('/')[-1].split('?')[0]
                              print(f"✅ Method 3 succeeded!")
                  except Exception as e:
                      print(f"⚠️ Method 3 failed: {e}")

              if raw_url:
                  # Encode URL path properly
                  if '?' in raw_url:
                      path_part, query = raw_url.split('?', 1)
                      encoded_url = urllib.parse.quote(path_part, safe=':/@.-_~!$&()*+,;=') + '?' + query
                  else:
                      encoded_url = urllib.parse.quote(raw_url, safe=':/@.-_~!$&()*+,;=')

                  # Extract filename if not set
                  if not file_name:
                      file_name = urllib.parse.unquote(raw_url.split('/')[-1].split('?')[0])
                  if not file_name:
                      file_name = f"telegram_file_{idx}"

                  file_name = file_name.split('?')[0].split('#')[0]

                  downloads.append({
                      'telegram_link': telegram_link,
                      'download_url': encoded_url,
                      'file_name': file_name
                  })
                  print(f"📄 Filename: {file_name}")
                  print(f"🔗 URL: {encoded_url[:80]}...")
              else:
                  print(f"❌ Could not resolve download link")
                  failed.append(telegram_link)

          # Save results
          with open('/tmp/downloads_list.json', 'w') as f:
              json.dump(downloads, f)

          with open('/tmp/failed_links.json', 'w') as f:
              json.dump(failed, f)

          print(f"\n{'='*60}")
          print(f"📊 RESOLUTION SUMMARY")
          print(f"{'='*60}")
          print(f"✅ Resolved: {len(downloads)} link(s)")
          print(f"❌ Failed: {len(failed)} link(s)")

          if failed:
              print(f"\n❌ Failed links:")
              for link in failed:
                  print(f"   • {link[:70]}...")

          if not downloads:
              print("\n❌ No links could be resolved!")
              sys.exit(1)

          print(f"\n📥 Ready to download {len(downloads)} file(s)")
          PYEOF

      - name: ⬇️ Download All Files
        id: download
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys, re, hashlib, glob

          def sanitize_name(filename):
              """Sanitize filename for safe filesystem use"""
              base, ext = os.path.splitext(filename)
              if not ext:
                  ext = '.bin'

              # Check for non-ASCII characters
              if not all(ord(c) < 128 for c in base):
                  # Use hash for non-ASCII names
                  safe_base = hashlib.md5(filename.encode('utf-8')).hexdigest()[:12]
              else:
                  safe_base = re.sub(r'[^a-zA-Z0-9._-]', '_', base)
                  safe_base = re.sub(r'_+', '_', safe_base)
                  safe_base = safe_base.strip('_.-')
                  if not safe_base:
                      safe_base = hashlib.md5(filename.encode('utf-8')).hexdigest()[:12]

              return f"{safe_base}{ext.lower()}"

          def get_unique_folder_name(base_path, folder_name):
              """Get a unique folder name, adding suffix if folder exists"""
              folder_path = os.path.join(base_path, folder_name)
              if not os.path.exists(folder_path):
                  return folder_name

              # Folder exists, add suffix
              counter = 1
              while True:
                  new_name = f"{folder_name}_copy{counter}"
                  new_path = os.path.join(base_path, new_name)
                  if not os.path.exists(new_path):
                      return new_name
                  counter += 1

          def download_file(url, output_path):
              """Try multiple download methods - prioritize single-connection for integrity"""
              methods = [
                  # Method 1: curl (most reliable, single connection)
                  lambda: subprocess.run([
                      'curl', '-L', '-C', '-', '--http1.1', '--max-time', '7200',
                      '--connect-timeout', '60', '--retry', '5', '--retry-delay', '5',
                      '-H', 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                      '-H', 'Accept: */*', '-H', 'Accept-Encoding: identity',
                      '-H', 'Referer: https://t.me/', '-H', 'Connection: keep-alive',
                      '-o', output_path, url
                  ], capture_output=True, timeout=7200),

                  # Method 2: wget (reliable backup)
                  lambda: subprocess.run([
                      'wget', '--timeout=600', '--tries=10', '--retry-connrefused', '--continue',
                      '--no-check-certificate',
                      '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                      '--header=Accept: */*', '--header=Accept-Encoding: identity',
                      '--header=Referer: https://t.me/',
                      '-O', output_path, url
                  ], capture_output=True, timeout=7200),

                  # Method 3: aria2c with single connection (to avoid corruption)
                  lambda: subprocess.run([
                      'aria2c',
                      '--max-connection-per-server=1', '--split=1',
                      '--max-tries=10', '--retry-wait=5', '--timeout=600', '--connect-timeout=60',
                      '--allow-overwrite=true', '--auto-file-renaming=false', '--check-certificate=false',
                      '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                      '--header=Accept: */*', '--header=Accept-Language: en-US,en;q=0.9',
                      '--header=Accept-Encoding: identity', '--header=Referer: https://t.me/',
                      '--header=Connection: keep-alive',
                      '--dir=' + os.path.dirname(output_path),
                      '--out=' + os.path.basename(output_path),
                      url
                  ], capture_output=True, timeout=7200),
              ]

              method_names = ['curl', 'wget', 'aria2c']

              for i, method in enumerate(methods):
                  try:
                      print(f"    🔄 Attempt {i+1}/3 — {method_names[i]}...")
                      if os.path.exists(output_path):
                          os.remove(output_path)

                      result = method()

                      # Clean up .aria2 metadata files
                      aria2_file = output_path + '.aria2'
                      if os.path.exists(aria2_file):
                          os.remove(aria2_file)
                          print(f"    🧹 Cleaned up .aria2 metadata file")

                      if os.path.exists(output_path):
                          size = os.path.getsize(output_path)
                          if size > 1024:
                              print(f"    ✅ Success with {method_names[i]}!")
                              return True

                      print(f"    ⚠️ {method_names[i]} failed")
                  except Exception as e:
                      print(f"    ⚠️ {method_names[i]} error: {e}")

              return False

          # Load downloads list
          with open('/tmp/downloads_list.json', 'r') as f:
              downloads = json.load(f)

          if not downloads:
              print("❌ No files to download!")
              sys.exit(1)

          # Ensure downloads folder exists
          os.makedirs('downloads', exist_ok=True)

          downloaded_files = []
          failed_downloads = []

          for idx, item in enumerate(downloads, 1):
              url = item['download_url']
              original_name = item['file_name']
              telegram_link = item['telegram_link']

              safe_name = sanitize_name(original_name)

              # Create folder name from filename (without extension)
              folder_base_name = os.path.splitext(safe_name)[0]

              # Get unique folder name (add suffix if folder exists)
              folder_name = get_unique_folder_name('downloads', folder_base_name)
              folder_path = os.path.join('downloads', folder_name)
              os.makedirs(folder_path, exist_ok=True)

              print(f"\n{'='*60}")
              print(f"⬇️ [{idx}/{len(downloads)}] Downloading: {original_name}")
              print(f"📄 Safe name: {safe_name}")
              print(f"📁 Folder: {folder_name}")
              print(f"🔗 From: {telegram_link[:60]}...")
              print(f"{'='*60}")

              output_path = os.path.join(folder_path, safe_name)

              if download_file(url, output_path):
                  # Clean up any remaining .aria2 files in the folder
                  for aria2_file in glob.glob(os.path.join(folder_path, '*.aria2')):
                      os.remove(aria2_file)
                      print(f"🧹 Cleaned up: {os.path.basename(aria2_file)}")

                  size = os.path.getsize(output_path)
                  size_mb = size / (1024 * 1024)
                  print(f"✅ Downloaded: {folder_name}/{safe_name} ({size_mb:.2f} MB)")

                  downloaded_files.append({
                      'filename': safe_name,
                      'folder_name': folder_name,
                      'original_name': original_name,
                      'telegram_link': telegram_link,
                      'size_bytes': size,
                      'size_mb': round(size_mb, 2),
                      'status': 'success'
                  })
              else:
                  print(f"❌ All download methods failed for: {original_name}")
                  # Keep the folder for failed downloads to track them
                  failed_downloads.append({
                      'original_name': original_name,
                      'folder_name': folder_name,
                      'telegram_link': telegram_link,
                      'status': 'failed'
                  })

          # Final cleanup: remove any .aria2 files that might have been left behind
          for aria2_file in glob.glob('downloads/**/*.aria2', recursive=True):
              os.remove(aria2_file)
              print(f"🧹 Final cleanup: {aria2_file}")

          # Save results
          with open('/tmp/downloaded_files.json', 'w') as f:
              json.dump(downloaded_files, f)

          with open('/tmp/failed_downloads.json', 'w') as f:
              json.dump(failed_downloads, f)

          print(f"\n{'='*60}")
          print(f"📊 DOWNLOAD SUMMARY")
          print(f"{'='*60}")
          print(f"✅ Downloaded: {len(downloaded_files)} file(s)")
          print(f"❌ Failed: {len(failed_downloads)} file(s)")

          if downloaded_files:
              total_mb = sum(f['size_mb'] for f in downloaded_files)
              print(f"💾 Total size: {total_mb:.2f} MB")

          if not downloaded_files:
              print("\n❌ No files were downloaded successfully!")
              sys.exit(1)
          PYEOF

      - name: 📦 Package Files (Handle Large Files)
        id: package
        run: |
          python3 << 'PYEOF'
          import os, subprocess, json, glob, shutil

          ZIP_PASSWORD = """${{ github.event.inputs.password }}"""
          # GitHub has a 100MB file size limit, use 80MB to be safe (zip adds overhead)
          MAX_FILE_SIZE_MB = 80

          # File extensions that are already compressed - NEVER re-zip these
          COMPRESSED_EXTENSIONS = {'.zip', '.rar', '.7z', '.gz', '.bz2', '.xz', '.tar', '.tgz', '.tbz2', '.lzma', '.cab'}

          # Ensure downloads folder exists
          os.makedirs('downloads', exist_ok=True)

          with open('/tmp/downloaded_files.json', 'r') as f:
              downloaded_files = json.load(f)

          if not downloaded_files:
              print("ℹ️ No files to package")
              exit(0)

          packaged_files = []

          for file_info in downloaded_files:
              filename = file_info['filename']
              folder_name = file_info['folder_name']
              folder_path = os.path.join('downloads', folder_name)
              filepath = os.path.join(folder_path, filename)

              if not os.path.exists(filepath):
                  continue

              size = os.path.getsize(filepath)
              size_mb = size / (1024 * 1024)

              entry = {
                  'original_name': file_info['original_name'],
                  'telegram_link': file_info['telegram_link'],
                  'folder_name': folder_name,
                  'size_mb': round(size_mb, 2),
                  'status': 'success',
                  'parts': []
              }

              print(f"\n{'='*60}")
              print(f"📦 Processing: {folder_name}/{filename} ({size_mb:.2f} MB)")

              base_name = os.path.splitext(filename)[0]
              ext = os.path.splitext(filename)[1].lower()

              # Check if file is already a compressed archive
              is_already_compressed = ext in COMPRESSED_EXTENSIONS

              if is_already_compressed:
                  print(f"📦 File is already a compressed archive ({ext}) - will NOT re-compress")

              # Case A: Already compressed archive - NEVER re-zip, just split if needed
              if is_already_compressed:
                  if size_mb > MAX_FILE_SIZE_MB:
                      print(f"✂️ Large archive ({size_mb:.2f} MB) - splitting into parts without re-compression...")

                      original_dir = os.getcwd()
                      os.chdir(folder_path)

                      # Use split command to split the file into parts
                      part_size_bytes = MAX_FILE_SIZE_MB * 1024 * 1024
                      cmd = ['split', '-b', f'{MAX_FILE_SIZE_MB}m', '-d', '--additional-suffix=.part', filename, f'{filename}.']
                      result = subprocess.run(cmd, capture_output=True, text=True)

                      if result.returncode == 0:
                          # Remove original file
                          os.remove(filename)

                          # Find all parts
                          parts = sorted(glob.glob(f'{filename}.[0-9]*.part'))

                          for part_file in parts:
                              part_size = os.path.getsize(part_file) / (1024 * 1024)
                              entry['parts'].append({
                                  'name': part_file,
                                  'size_mb': round(part_size, 2)
                              })
                              print(f"  ✅ Part: {part_file} ({part_size:.2f} MB)")

                          print(f"✅ Split into {len(entry['parts'])} parts")

                          # Create a reassembly script
                          script_lines = [
                              '#!/bin/bash',
                              f'# Reassemble {filename}',
                              '# Run this script in the same folder as all the .part files',
                              '',
                              f'cat {filename}.*.part > {filename}',
                              f'echo "Reassembled: {filename}"'
                          ]
                          if ext == '.zip':
                              script_lines.append(f'echo "You can now extract with: unzip {filename}"')
                          with open('reassemble.sh', 'w') as f:
                              f.write('\n'.join(script_lines) + '\n')
                          print(f"  📝 Created reassemble.sh script")

                      else:
                          print(f"⚠️ Split failed: {result.stderr}")
                          entry['parts'].append({'name': filename, 'size_mb': round(size_mb, 2)})

                      os.chdir(original_dir)
                  else:
                      # Small compressed file - keep as-is
                      print(f"📄 Compressed file is under {MAX_FILE_SIZE_MB}MB, keeping original")
                      entry['parts'].append({'name': filename, 'size_mb': round(size_mb, 2)})

              # Case B: Large uncompressed file needs splitting
              elif size_mb > MAX_FILE_SIZE_MB:
                  print(f"✂️ File is larger than {MAX_FILE_SIZE_MB}MB, creating split archive...")

                  original_dir = os.getcwd()
                  os.chdir(folder_path)

                  # Use 7z for splitting - more reliable than zip split
                  archive_name = f'{base_name}.7z'

                  if ZIP_PASSWORD:
                      cmd = ['7z', 'a', '-v80m', f'-p{ZIP_PASSWORD}', '-mhe=on', archive_name, filename]
                  else:
                      cmd = ['7z', 'a', '-v80m', '-mx=0', archive_name, filename]  # -mx=0 = store only, fast

                  print(f"  📦 Creating 7z split archive...")
                  result = subprocess.run(cmd, capture_output=True, text=True)

                  if result.returncode == 0:
                      # Remove original file
                      os.remove(filename)

                      # Find all parts: .7z.001, .7z.002, etc.
                      parts = sorted(glob.glob(f'{base_name}.7z.*'))
                      if not parts:
                          parts = [archive_name] if os.path.exists(archive_name) else []

                      for part_file in parts:
                          part_size = os.path.getsize(part_file) / (1024 * 1024)
                          entry['parts'].append({
                              'name': part_file,
                              'size_mb': round(part_size, 2)
                          })
                          print(f"  ✅ Part: {part_file} ({part_size:.2f} MB)")

                      print(f"✅ Created {len(entry['parts'])} part 7z archive")
                  else:
                      print(f"⚠️ 7z failed: {result.stderr}")
                      # Fallback: try split command
                      cmd = ['split', '-b', f'{MAX_FILE_SIZE_MB}m', '-d', '--additional-suffix=.part', filename, f'{filename}.']
                      result = subprocess.run(cmd, capture_output=True, text=True)
                      if result.returncode == 0:
                          os.remove(filename)
                          parts = sorted(glob.glob(f'{filename}.[0-9]*.part'))
                          for part_file in parts:
                              part_size = os.path.getsize(part_file) / (1024 * 1024)
                              entry['parts'].append({'name': part_file, 'size_mb': round(part_size, 2)})
                      else:
                          entry['parts'].append({'name': filename, 'size_mb': round(size_mb, 2)})

                  os.chdir(original_dir)

              # Case C: Password requested for uncompressed file - create password-protected archive
              elif ZIP_PASSWORD:
                  print(f"🔐 Creating password-protected 7z archive...")
                  archive_name = f'{base_name}.7z'

                  original_dir = os.getcwd()
                  os.chdir(folder_path)

                  cmd = ['7z', 'a', f'-p{ZIP_PASSWORD}', '-mhe=on', archive_name, filename]
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  os.chdir(original_dir)

                  archive_path = os.path.join(folder_path, archive_name)
                  if result.returncode == 0 and os.path.exists(archive_path):
                      os.remove(filepath)
                      archive_size = os.path.getsize(archive_path) / (1024 * 1024)
                      entry['parts'].append({'name': archive_name, 'size_mb': round(archive_size, 2)})
                      print(f"✅ Created: {archive_name} ({archive_size:.2f} MB)")
                  else:
                      print(f"⚠️ 7z failed, keeping original")
                      entry['parts'].append({'name': filename, 'size_mb': round(size_mb, 2)})

              # Case D: Small uncompressed file, no password - KEEP AS-IS
              else:
                  print(f"📄 File is under {MAX_FILE_SIZE_MB}MB, keeping original format")
                  entry['parts'].append({'name': filename, 'size_mb': round(size_mb, 2)})

              packaged_files.append(entry)

          # Add failed downloads to packaged_files for README generation
          try:
              with open('/tmp/failed_downloads.json', 'r') as f:
                  failed_downloads = json.load(f)
                  for failed in failed_downloads:
                      packaged_files.append({
                          'original_name': failed['original_name'],
                          'telegram_link': failed['telegram_link'],
                          'folder_name': failed.get('folder_name', 'unknown'),
                          'size_mb': 0,
                          'status': 'failed',
                          'parts': []
                      })
          except:
              pass

          with open('/tmp/packaged_files.json', 'w') as f:
              json.dump(packaged_files, f)

          print(f"\n{'='*60}")
          print(f"📂 Final structure in downloads/:")
          for folder in sorted(os.listdir('downloads')):
              folder_path = os.path.join('downloads', folder)
              if os.path.isdir(folder_path):
                  print(f"  📁 {folder}/")
                  for f in sorted(os.listdir(folder_path)):
