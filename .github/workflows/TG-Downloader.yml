      - name: 📤 Commit & Push All Files
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          echo "🔄 Syncing with remote..."
          git fetch origin "$BRANCH"
          git pull --rebase origin "$BRANCH" || git pull origin "$BRANCH" --no-rebase

          echo ""
          echo "📂 Files to commit:"
          find downloads -type f -exec ls -lh {} \; 2>/dev/null || echo "  (no downloads)"
          ls -lh Links.md 2>/dev/null || echo "  (no Links.md)"

          echo ""
          echo "📦 Staging files..."
          git add downloads/ Links.md

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          FILE_COUNT=$(git diff --staged --name-only | wc -l)
          echo "📦 Committing $FILE_COUNT file(s)..."

          git commit -m "📲 Telegram download: $FILE_COUNT file(s) [skip ci]"

          echo "🚀 Pushing to $BRANCH..."
          RETRY=0
          MAX_RETRIES=5

          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))

            if git push origin "HEAD:$BRANCH"; then
              echo "✅ Push successful!"
              break
            else
              echo "⚠️ Push failed (attempt $RETRY/$MAX_RETRIES)"
              if [ $RETRY -lt $MAX_RETRIES ]; then
                echo "🔄 Pulling and retrying..."
                git pull --rebase origin "$BRANCH" || git pull origin "$BRANCH" --no-rebase
                sleep $((2 + RANDOM % 5))
              fi
            fi
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "❌ Push failed after $MAX_RETRIES attempts"
            exit 1
          fi

          echo ""
          echo "🎉 All files uploaded successfully!"

      - name: 📋 Final Report
        if: always()
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│           📲 Telegram Downloader — Final Report            │"
          echo "├─────────────────────────────────────────────────────────────┤"

          if [ -f "/tmp/downloaded_files.json" ]; then
            DOWNLOAD_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/downloaded_files.json'))))" 2>/dev/null || echo "?")
            echo "│ ✅ Downloaded : $DOWNLOAD_COUNT file(s)"
          fi

          if [ -f "/tmp/failed_downloads.json" ]; then
            FAILED_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/failed_downloads.json'))))" 2>/dev/null || echo "0")
            if [ "$FAILED_COUNT" != "0" ]; then
              echo "│ ❌ Failed     : $FAILED_COUNT file(s)"
            fi
          fi

          echo "│ 📁 Location   : ./downloads/<folder_name>/"
          echo "│ 📄 Links      : ./Links.md"
          echo "│ 📄 Index      : ./downloads/README.md"
          echo "│ 📦 Format     : Original format preserved (no double-zipping)"

          if [ -n "${{ github.event.inputs.password }}" ]; then
            echo "│ 🔐 Archive    : Password-protected (7z)"
          fi

          echo "└─────────────────────────────────────────────────────────────┘"

          if [ -d "downloads" ]; then
            echo ""
            echo "📂 Downloaded files:"
            find downloads -type f -exec ls -lh {} \; 2>/dev/null | head -20 || echo "  (empty)"
          fi
